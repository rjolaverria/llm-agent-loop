name: Publish Package

on:
  release:
    types: [published]

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing needs npm >= 11.5.1 (this repo publishes
      # tokenlessly). Pin an exact npm 11 for reproducible releases; it runs on
      # the pinned Node 22.14 (`>=22.9.0`), unlike npm@latest (12.x, which needs
      # Node >= 22.22.2). Node itself must also be >= 22.14 for OIDC (see .nvmrc).
      - name: Pin npm to an OIDC-capable release
        run: npm install -g npm@11.18.0
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run build --if-present
      - run: npm test
      - run: npm publish --provenance --access public
