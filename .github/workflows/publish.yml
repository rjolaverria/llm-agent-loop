name: Publish Package

on:
  release:
    types: [published]

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      # npm 11 is required for OIDC trusted publishing (>= 11.5.1) and is
      # compatible with the pinned Node 22.13 (`>=22.9.0`). `npm@latest` is now
      # npm 12, which requires Node >= 22.22.2 and would fail here.
      - name: Pin npm to an OIDC-capable release
        run: npm install -g npm@11
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run build --if-present
      - run: npm test
      - run: npm publish --provenance --access public
